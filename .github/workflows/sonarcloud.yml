name: Run SonarCloud coverage scan

on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        description: "SonarCloud token used for authentication"
        required: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  build:
    if: github.run_number != 1
    name: CDP SonarCloud coverage scan
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "zulu"
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up .NET 8.0
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: |
            8.0
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner
      - name: Cache dotNet code coverage
        id: cache-sonar-coverage
        uses: actions/cache@v4
        with:
          path: ./.sonar/coverage
          key: ${{ runner.os }}-sonar-coverage
          restore-keys: ${{ runner.os }}-sonar-coverage
      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          [ -d tools ] || mkdir tools
          cd tools
          dotnet tool install dotnet-sonarscanner --tool-path ../.sonar/scanner --ignore-failed-sources
      - name: Install dotNet code coverage
        if: steps.cache-sonar-coverage.outputs.cache-hit != 'true'
        run: |
          [ -d tools ] || mkdir tools
          cd tools
          dotnet tool install dotnet-coverage --tool-path ../.sonar/coverage --ignore-failed-sources
      - name: Build and analyze
        if: github.actor != 'dependabot[bot]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./.sonar/scanner/dotnet-sonarscanner begin \
            /k:"DEFRA_cads-data-service" \
            /o:"defra" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.projectBaseDir="${{ github.workspace }}" \
            /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml
            /d:sonar.issue.ignore.allfile=seed
            /d:sonar.issue.ignore.allfile.regex=.*seed.*
          dotnet build Cads.Cds.sln --no-incremental
          ./.sonar/coverage/dotnet-coverage collect "dotnet test Cads.Cds.sln --filter \"Dependence!=testcontainers\"" -f xml -o "coverage.xml"
          ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"

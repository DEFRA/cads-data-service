services:
  cads_cds:
    build:
      args:
        TARGETARCH: arm64
    labels:
      com.microsoft.visual-studio.project-name: "Cads.Cds"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=5555
      - AWS__ServiceURL=http://cds-localstack-emulator:4566
      - Postgres__DefaultConnection=Host=postgres;Port=5432;Database=cads;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - Postgres__ReadOnlyConnection=Host=postgres;Port=5432;Database=cads;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - Modules__Ingester__Queues__CadsCds__QueueUrl=http://sqs.eu-west-2.127.0.0.1:4566/000000000000/cads-cds-queue
      - Modules__Ingester__Queues__CadsCds__DlqQueueUrl=http://sqs.eu-west-2.127.0.0.1:4566/000000000000/cads-cds-queue-deadletter
      - Modules__StorageBridge__Storage__CadsInternal__BucketName=cads-internal-bucket
      - AuthenticationConfiguration__EnableApiKey=true
      - AuthenticationConfiguration__ApiGatewayExists=false
      - AuthenticationConfiguration__Authority=
    ports:
      - "5555"
    volumes:
      # Mac-specific paths for user secrets and HTTPS certificates
      - ~/.microsoft/usersecrets:/home/app/.microsoft/usersecrets:ro
      - ~/.microsoft/usersecrets:/root/.microsoft/usersecrets:ro
      - ~/.aspnet/https:/home/app/.aspnet/https:ro
      - ~/.aspnet/https:/root/.aspnet/https:ro
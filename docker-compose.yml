name: 'cads_cds'
services:
  localstack:
    container_name: "cds-localstack-emulator"
    image: localstack/localstack:3.0.2
    ports:
      - '4568:4566'
    env_file:
      - 'compose/aws.env'
    environment:
      DEBUG: ${DEBUG:-1}
      LS_LOG: WARN # Localstack DEBUG Level
      SERVICES: s3,sqs,firehose
      LOCALSTACK_HOST: 127.0.0.1
    volumes:
      - "./localstack_data:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - ./compose/start-localstack.sh:/etc/localstack/init/ready.d/start-localstack.sh
    healthcheck:
      test: [ 'CMD', 'curl', 'http://cds-localstack-emulator:4566/health' ]
      interval: 5s
      start_period: 5s
      retries: 3
    networks:
      - cdp-tenant

  postgres:
    image: postgres:16.6
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - "./postgres-data:/var/lib/postgresql/data"
      - "./compose/postgres/init:/docker-entrypoint-initdb.d"
      - "./compose/postgres/config:/etc/postgres-config"
    ports:
      - 5432:5432
    command: >
      postgres
        -c config_file=/etc/postgres-config/postgresql.conf
        -c hba_file=/etc/postgres-config/pg_hba.conf
        -c listen_addresses='*'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cdp-tenant

  reference-postgres:
    image: postgres:16.6
    container_name: reference-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_REF_DB}
    ports:
      - "55432:5432"
    volumes:
      - "./reference-postgres-data:/var/lib/postgresql/data"
      - "./compose/postgres/config:/etc/postgres-config"
    command: >
      postgres
        -c config_file=/etc/postgres-config/postgresql.conf
        -c hba_file=/etc/postgres-config/pg_hba.conf
        -c listen_addresses='*'
    networks:
      - cdp-tenant

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - 16543:80
    volumes:
      - "./compose/postgres/servers/servers.json:/pgadmin4/servers.json"
      - "./compose/postgres/servers/pgpass:/pgpass"
      - "./pgadmin-data:/var/lib/pgadmin"
    command: sh -c "chmod 600 /pgpass && /entrypoint.sh"
    networks:
      - cdp-tenant

  liquibase:
    build:
      context: .
      dockerfile_inline: |
        FROM liquibase/liquibase:5.0.1
        RUN lpm add postgresql --global
        USER liquibase
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./changelog:/liquibase/changelog
    command: sh -c "liquibase --url=jdbc:postgresql://postgres:5432/${POSTGRES_DB} --username=${POSTGRES_USER} --password=${POSTGRES_PASSWORD} --searchPath=/liquibase/changelog --changelog-file=db.changelog.xml --liquibaseSchemaName=public update && tail -f /dev/null"
    networks:
      - cdp-tenant

  redis:
    container_name: "cds-redis"
    image: redis:7.2.3-alpine3.18
    ports:
      - '6381:6379'
    restart: always
    networks:
      - cdp-tenant

  cads_cds:
    container_name: "cads_cds"
    platform: linux
    image: cads_cds
    build: ./
    ports:
      - '5555:5555'
      - '5556:5556'
    volumes:
      - ./static_data:/app/StaticData
      - ./certs:/https:ro
    depends_on:
      localstack:
        condition: service_healthy
      postgres:
        condition: service_started
    env_file:
      - 'compose/aws.env'
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://0.0.0.0:5555;https://0.0.0.0:5556"
      ASPNETCORE_HTTP_PORTS: "5555"
      ASPNETCORE_HTTPS_PORTS: "5556"
      Kestrel__Certificates__Default__Path: "/https/https-dev-cert.pfx"
      Kestrel__Certificates__Default__Password: "testpassword"
      PORT: 5555
      LOCALSTACK_ENDPOINT: http://cds-localstack-emulator:4566
    networks:
      - cdp-tenant

networks:
  cdp-tenant:
    name: cdp-tenant

name: 'cads_cds'
services:
  localstack:
    container_name: "cds-localstack-emulator"
    image: localstack/localstack:3.0.2
    ports:
      - '4568:4566'
    env_file:
      - 'compose/aws.env'
    environment:
      DEBUG: ${DEBUG:-1}
      LS_LOG: WARN # Localstack DEBUG Level
      SERVICES: s3,sqs,firehose
      LOCALSTACK_HOST: 127.0.0.1
    volumes:
      - "./localstack_data:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - ./compose/start-localstack.sh:/etc/localstack/init/ready.d/start-localstack.sh
    healthcheck:
      test: [ 'CMD', 'curl', 'http://cds-localstack-emulator:4566/health' ]
      interval: 5s
      start_period: 5s
      retries: 3
    networks:
      - cdp-tenant

  postgres:
    image: postgres:16.6
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - "./postgres-data:/var/lib/postgresql/data"
    ports:
      - 5432:5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cdp-tenant

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - 16543:80
    volumes:
      - "./servers.json:/pgadmin4/servers.json"
      - "./pgadmin-data:/var/lib/pgadmin"
    networks:
      - cdp-tenant
        
  liquibase:
    build:
      context: .
      dockerfile_inline: |
        FROM liquibase/liquibase:5.0.1
        RUN lpm add postgresql --global
        USER liquibase
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - "./changelog:/liquibase/changelog"
    command: --url=jdbc:postgresql://postgres:5432/${POSTGRES_DB} --username=${POSTGRES_USER} --password=${POSTGRES_PASSWORD} --changelog-file=db.changelog.xml update
    networks:
      - cdp-tenant

  redis:
    container_name: "cds-redis"
    image: redis:7.2.3-alpine3.18
    ports:
      - '6381:6379'
    restart: always
    networks:
      - cdp-tenant

  cads_cds:
    container_name: "cads_cds"
    platform: linux
    image: cads_cds
    build: ./
    ports:
      - '5555:5555'
    depends_on:
      localstack:
        condition: service_healthy
      postgres:
        condition: service_started
    env_file:
      - 'compose/aws.env'
    environment:
      PORT: 5555
      LOCALSTACK_ENDPOINT: http://cds-localstack-emulator:4566
    networks:
      - cdp-tenant

networks:
  cdp-tenant:
    name: cdp-tenant
